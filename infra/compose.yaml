services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: barbershop
      POSTGRES_PASSWORD: barbershop
      POSTGRES_DB: barbershop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbershop -d barbershop"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - barbershop-network

volumes:
  postgres_data:

networks:
  barbershop-network:
    driver: bridge
